<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GRAVAX · Airdrop Campaign</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   GRAVAX DESIGN SYSTEM — PRODUCTION READY
   ═══════════════════════════════════════════ */
:root{
  --lime:    #00FF9F;
  --lime2:   #39FF14;
  --forest:  #00B074;
  --gold:    #D4FF4D;
  --black:   #0A0A0A;
  --card:    #111814;
  --card2:   #0d1610;
  --border:  rgba(0,255,159,0.18);
  --border2: rgba(0,255,159,0.3);
  --text:    #E8F5EC;
  --muted:   #4a7a5a;
  --mono:    'Space Mono',monospace;
  --display: 'Orbitron',sans-serif;
  --body:    'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--black);
  color:var(--text);
  font-family:var(--body);
  overflow-x:hidden;
  min-height:100vh;
}

/* ── COSMIC BACKGROUND ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(0,255,159,0.06) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 60%, rgba(57,255,20,0.04) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 100%, rgba(0,176,116,0.05) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── GRID BG ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,255,159,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,159,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;z-index:0;
}

/* ── PARTICLES ── */
.particles{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.particle{
  position:absolute;
  width:2px;height:2px;
  background:var(--lime);
  border-radius:50%;
  opacity:0;
  animation:float-up linear infinite;
}
@keyframes float-up{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:0.6;}
  90%{opacity:0.2;}
  100%{transform:translateY(-20px) translateX(40px);opacity:0;}
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 6%;
  background:rgba(10,10,10,0.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.logo{display:flex;align-items:center;gap:11px;cursor:pointer;}
.logo-mark{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#39FF14,#00B074);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(57,255,20,0.45);
}
.logo-mark svg{width:22px;height:22px;}
.logo-name{
  font-family:var(--display);
  font-size:18px;font-weight:800;
  color:#fff;letter-spacing:0.04em;
  text-shadow:0 0 20px rgba(0,255,159,0.4);
}
.header-right{display:flex;align-items:center;gap:12px;}
.net-pill{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border-radius:20px;
  background:rgba(0,255,159,0.06);
  border:1px solid var(--border);
  font-size:11px;color:var(--muted);
  font-family:var(--mono);letter-spacing:0.06em;
}
.net-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--lime);
  box-shadow:0 0 8px var(--lime);
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 8px var(--lime);}
  50%{box-shadow:0 0 16px var(--lime),0 0 24px rgba(0,255,159,0.3);}
}
.connect-btn{
  display:flex;align-items:center;gap:8px;
  padding:11px 24px;border-radius:8px;
  border:1.5px solid var(--lime);
  background:transparent;
  color:var(--lime);
  font-family:var(--display);
  font-size:11px;font-weight:700;
  letter-spacing:0.08em;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;overflow:hidden;
}
.connect-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,255,159,0.12),transparent);
  opacity:0;transition:opacity 0.2s;
}
.connect-btn:hover{
  background:var(--lime);color:#0A0A0A;
  box-shadow:0 0 28px rgba(0,255,159,0.5),0 0 60px rgba(0,255,159,0.2);
  transform:translateY(-1px);
}
.connect-btn:hover::before{opacity:1;}
.connect-btn.connected{
  background:rgba(0,255,159,0.07);
  border-color:rgba(0,255,159,0.3);
  color:var(--lime);
  font-family:var(--mono);font-size:12px;font-weight:400;
}

/* ── WALLET BAR ── */
.wallet-bar{
  display:none;
  background:rgba(0,176,116,0.06);
  border-bottom:1px solid var(--border);
  padding:10px 6%;gap:28px;flex-wrap:wrap;
  position:relative;z-index:10;
}
.wallet-bar.show{display:flex;align-items:center;}
.wb-item{display:flex;flex-direction:column;gap:1px;}
.wb-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;}
.wb-val{font-size:13px;color:var(--lime);font-family:var(--mono);font-weight:700;}

/* ── HERO ── */
.hero{
  display:grid;
  grid-template-columns:1fr 500px;
  align-items:center;
  padding:70px 6% 50px;
  gap:30px;
  position:relative;z-index:1;
  min-height:88vh;
}
.hero-left{display:flex;flex-direction:column;}
.campaign-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:30px;
  background:rgba(0,255,159,0.07);
  border:1px solid rgba(0,255,159,0.22);
  font-size:11px;color:rgba(0,255,159,0.75);
  font-family:var(--mono);letter-spacing:0.08em;
  text-transform:uppercase;
  margin-bottom:28px;width:fit-content;
}

  font-family
