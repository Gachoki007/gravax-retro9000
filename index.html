const SUPABASE_URL = "https://odeezisshsmjzrhpgpwq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kZWV6aXNzaHNtanpyaHBncHdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzE1NjgsImV4cCI6MjA5NTg0NzU2OH0.5MBlzCm7DoGNODHcCeosGo-aTEJgkadx0Xw58M2YeNs";
const TABLE = "gravax_progress";
const BUCKET = "quest-proofs";

let userAddress = null;
let progress = [false, false, false, false];

/* ══════════════════════════════════
   QUESTS (Updated logic)
══════════════════════════════════ */
const QUESTS = [
  { id:0, step:"STEP 1", name:"Follow @greenavax", desc:"Follow our official X account and claim instantly.", reward:50, xp:10, btn:"CLAIM 50 GRAV", modalType:"claim" },
  { id:1, step:"STEP 2", name:"Upload Retro 9000 Proof", desc:"Screenshot of your wallet connected to Retro 9000.", reward:100, xp:20, btn:"UPLOAD PROOF", modalType:"upload" },
  { id:2, step:"STEP 3", name:"Upload X Link Proof", desc:"Screenshot of your X account linked in Retro 9000.", reward:100, xp:20, btn:"UPLOAD PROOF", modalType:"upload" },
  { id:3, step:"STEP 4", name:"Paste your AVAX C-Chain address", desc:"Submit your wallet address for the airdrop.", reward:50, xp:10, btn:"SUBMIT ADDRESS", modalType:"address" }
];

/* Supabase helpers */
function headers() {
  return {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
    'Content-Type': 'application/json'
  };
}

async function upsertProgress(fields) {
  if (!userAddress) return;
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: 'POST',
    headers: {...headers(), 'Prefer': 'resolution=merge-duplicates'},
    body: JSON.stringify({ wallet: userAddress, ...fields })
  });
}

async function loadUserData() {
  if (!userAddress) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&wallet=eq.${userAddress}`, { headers: headers() });
  const data = await res.json();
  const row = data[0] || {};

  progress = [
    !!row.quest1_done,
    !!row.quest2_proof,
    !!row.quest3_proof,
    !!row.quest4_address
  ];

  const earned = QUESTS.reduce((sum, q, i) => progress[i] ? sum + q.reward : sum, 0);

  document.getElementById("wbAddr").textContent = userAddress.slice(0,6)+"…"+userAddress.slice(-4);
  document.getElementById("wbDone").textContent = `${progress.filter(Boolean).length} / 4`;
  document.getElementById("wbEarned").textContent = `${earned} GRAV`;

  render();
}

/* Render with strict sequential + grey done state */
function render() {
  const list = document.getElementById("questList");
  list.innerHTML = "";
  QUESTS.forEach((q, i) => {
    const isDone = progress[i];
    const isLocked = i > 0 && !progress[i-1];

    const card = document.createElement("div");
    card.className = `quest-card${isDone ? " done" : ""}${isLocked ? " locked" : ""}`;
    card.innerHTML = `
      <div class="q-icon">${isDone ? `<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#00FF9F" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : iconSVG(q.id)}</div>
      <div class="q-body">
        <div class="q-name">${q.name}</div>
        <div class="q-desc">${q.desc}</div>
        <span class="q-step">${q.step}</span>
      </div>
      <div class="q-reward">
        <div class="qr-label">REWARD</div>
        <div class="qr-amount">${q.reward}</div>
        <div class="qr-unit">GRAV</div>
      </div>
      <button class="q-btn${isDone ? " done-btn" : ""}" onclick="event.stopPropagation();questClick(${q.id})">
        ${isDone ? "✓ DONE" : q.btn}
      </button>`;
    if (!isLocked) card.onclick = () => questClick(q.id);
    list.appendChild(card);
  });
}

function iconSVG(id) {
  const icons = { /* your original icons */ };
  return icons[id] || "";
}

/* Quest Click - strict sequential */
function questClick(id) {
  if (!userAddress) { openModal(walletModal()); return; }
  if (progress[id]) { showToast("Already completed"); return; }
  if (id > 0 && !progress[id-1]) { showToast("Complete previous quest first", "err"); return; }

  const q = QUESTS[id];
  if (q.modalType === "claim") openModal(claimModal());
  else if (q.modalType === "upload") openModal(uploadModal(id));
  else if (q.modalType === "address") openModal(addressModal());
}

/* Quest 1 Claim */
function claimModal() {
  return `
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>Follow @greenavax</h3>
    <p class="modal-desc">Follow our official account then claim your reward.</p>
    <a class="ext-link" href="https://x.com/greenavax" target="_blank">↗ Follow @greenavax</a>
    <div class="m-actions" style="margin-top:24px">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="claimQuest1()">CLAIM 50 GRAV</button>
    </div>`;
}

async function claimQuest1() {
  await upsertProgress({ quest1_done: true });
  closeModal();
  showToast("Quest 1 completed +50 GRAV ✓");
  await loadUserData();   // ← Instantly shows in GRAV Earned
}

/* INIT */
render();
</script>
